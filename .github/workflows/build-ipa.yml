name: Build ByeDPIBg IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app
          xcodebuild -version
          xcodebuild -showsdks

      - name: Clean
        run: |
          rm -rf build
          rm -rf ~/Library/Developer/Xcode/DerivedData
          mkdir -p build

      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project SwByeDPI.xcodeproj \
            -scheme ByeDPIBg \
            -skipPackagePluginValidation \
            -skipMacroValidation

      - name: Build ByeDPIBg unsigned app
        run: |
          set -o pipefail

          xcodebuild \
            -project SwByeDPI.xcodeproj \
            -scheme ByeDPIBg \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            -resultBundlePath build/ByeDPIBg.xcresult \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            IPHONEOS_DEPLOYMENT_TARGET=12.0 \
            clean build 2>&1 | tee build-xcodebuild.log

      - name: Print real errors
        if: failure()
        run: |
          echo "===== Swift compiler errors ====="
          grep -n -B 8 -A 12 -E ":[0-9]+:[0-9]+: error:|error:|fatal error:" build-xcodebuild.log || true

          echo "===== Around CompileSwift ====="
          grep -n -B 40 -A 80 "CompileSwift normal arm64" build-xcodebuild.log || true

          echo "===== Last 500 lines ====="
          tail -n 500 build-xcodebuild.log || true

      - name: Upload raw build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-xcodebuild-log
          path: build-xcodebuild.log

      - name: Upload xcresult
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ByeDPIBg-xcresult
          path: build/ByeDPIBg.xcresult

      - name: Package IPA
        if: success()
        run: |
          set -e

          APP_PATH=$(find build/DerivedData \
            -path "*/Build/Products/Release-iphoneos/*.app" \
            | grep -i "ByeDPIBg.app" \
            | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "ByeDPIBg.app not found"
            find build/DerivedData -path "*/Build/Products/Release-iphoneos/*.app"
            exit 1
          fi

          echo "Found app: $APP_PATH"

          rm -rf Payload ByeDPIBg-unsigned.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -qry ByeDPIBg-unsigned.ipa Payload

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ByeDPIBg-unsigned-ipa
          path: ByeDPIBg-unsigned.ipa
